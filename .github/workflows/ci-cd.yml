name: CMS FWA CI/CD

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cms-fwa-rag-chatbot
  IMAGE_NAME: cms-fwa-rag-chatbot
  PROJECT_DIR: "Deployment of CMS Healthcare Multi-Agent RAG"

jobs:

  test-build:
    name: Test and Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Generate sample/demo data
        run: |
          python -m src.generate_sample_data

      - name: Build vector index
        run: |
          python store_index.py

      - name: Import smoke test
        run: |
          python scripts/check_imports.py

      - name: Validate data files
        run: |
          python scripts/validate_data.py

      - name: Compile Python files
        run: |
          python -m py_compile streamlit_app.py
          python -m py_compile app.py

      - name: Run tests
        run: |
          pytest -q

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .

  aws-ecr:
    name: Push Docker Image to AWS ECR
    runs-on: ubuntu-latest

    needs: test-build

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names $ECR_REPOSITORY || \
          aws ecr create-repository --repository-name $ECR_REPOSITORY

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .

      - name: Tag Docker image
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}

          docker tag $IMAGE_NAME:latest $ECR_URI:latest

      - name: Push Docker image to ECR
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}

          docker push $ECR_URI:latest

      - name: Deployment summary
        run: |
          echo "Docker image successfully pushed to AWS ECR."
version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo "Training and evaluating model..."
      - python -m src.train
      - python -m src.evaluate_system
      - pytest tests

  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t agentic-fwa-detection-final .

  post_build:
    commands:
      - echo "Build completed."

artifacts:
  files:
    - '**/*'
